<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fotos/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Condominio Playa Cañaveral — Lotes de 250m² en Bermejo, Tarija, Bolivia. Desde $1/día. Membresía Parque Acuático incluida." />
    <title>Playa Cañaveral Condominio — Bermejo, Tarija</title>

    <!-- 🔥 DARK MODE SIN PARPADEO -->
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");

          if (saved === "dark") {
            document.documentElement.classList.add("dark");
          } else if (saved === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
              document.documentElement.classList.add("dark");
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="bg-white dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
